name: 'Gemini Code Review'
description: 'Automated code review using Google Gemini API'
author: 'Your Name'
inputs:
  gemini-api-key:
    description: 'API key for Google Gemini'
    required: false
  gemini-model:
    description: 'Gemini model to use (e.g., gemini-2.5-flash, gemini-2.5-pro)'
    required: false
    default: 'gemini-2.5-flash'
  qianwen-api-key:
    description: 'Deprecated: use gemini-api-key instead'
    required: false
  qianwen-model:
    description: 'Deprecated: use gemini-model instead'
    required: false
  github-token:
    description: 'GitHub token with pull-requests: write permission'
    required: true
    default: ${{ github.token }}
  review-comment-title:
    description: 'Title of the review comment'
    required: false
    default: '🤖 Gemini 代码评审意见'
  ignore-comment:
    description: 'Comment pattern to ignore review (default: IGNORE)'
    required: false
    default: 'IGNORE'
  ignored-dirs:
    description: 'Additional ignored directories (comma separated, e.g., docs/,test/)'
    required: false
    default: ''
  ignored-extensions:
    description: 'Additional ignored file extensions (comma separated, e.g., .md,.json)'
    required: false
    default: ''
  batch-size:
    description: 'Number of files to review in one batch (avoid 429, 1-10)'
    required: false
    default: '10'
  max-retries:
    description: 'Max retries for failed requests (1-5)'
    required: false
    default: '3'
runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'code'
  color: 'blue'
