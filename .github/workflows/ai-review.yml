name: 千问代码自动评审
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master, develop]

# 关键：配置足够的权限
permissions:
  pull-requests: write  # 允许评论PR
  contents: write        # 允许读取代码Diff
  statuses: write       # 可选：如需更新Commit状态

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 使用自定义的千问Code Review Action
      - name: 千问代码评审
        uses: imxty/qw-codereview@v2  # 如果你将Action发布到GitHub Marketplace，替换为：username/qianwen-code-review-action@v1
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          gemini-model: gemini-3.5-flash
          review-comment-title: 🤖 千问代码评审意见
          github-token: ${{ secrets.GITHUB_TOKEN }}  # 默认令牌（已配置权限）
          ignore-comment: IGNORE
          ignored-dirs: "docs/,test/,mock/,scripts/,backup/,custom_dir/"
